name: Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  web:
    name: Build & deploy novat.app
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      needs_release: ${{ steps.ver.outputs.needs_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Read version / release gate
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "needs_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Missing VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID — skipping web deploy."
            echo "Add these secrets for automatic novat.app deploys (see docs/DEPLOY-SECRETS.md)."
            exit 0
          fi
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  desktop-release:
    name: Electron Windows release
    runs-on: windows-latest
    needs: web
    if: needs.web.outputs.needs_release == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build Electron installer
        shell: bash
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.web.outputs.version }}
        run: |
          EXE="release/NOVAT-Setup-${VERSION}.exe"
          if [ ! -f "$EXE" ]; then
            echo "Installer not found: $EXE"
            ls -la release || true
            exit 1
          fi
          gh release create "v${VERSION}" "$EXE" \
            --title "NOVAT ${VERSION}" \
            --notes "Production release ${VERSION}. Web: https://novat.app" \
            --latest
